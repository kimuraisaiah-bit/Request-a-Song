<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request a Song</title>
 <img src="logo.png">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      width: 90%;
      max-width: 600px;
      background: #171717;
      padding: 44px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 28px;
      font-size: 2rem;
    }

    input, textarea, button {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 16px;
      padding: 16px;
      border-radius: 10px;
      border: none;
      font-size: 18px;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    button {
      background: white;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="box">
      <img src="logo.png" class="logo">
    <h1>Request a Song</h1>

    <form action="https://formsubmit.co/realaicover1@gmail.com" method="POST">
      <input type="text" name="name" placeholder="Your Name" required />
      <input type="text" name="song_artist" placeholder="Song and Artist" required />
      <input type="url" name="youtube_link" placeholder="YouTube Link" required />
      <textarea name="notes" placeholder="Extra notes or style"></textarea>

      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_subject" value="New Song Request!">

      <button type="submit">Send Request</button>
    </form>
  </div>
</body>
</html>
